name: Publish MCP Registry

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: glyphloop-mcp-registry-publish
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MCP_PUBLISHER_VERSION: v1.7.9
      MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install verified MCP publisher
        run: |
          curl --fail --location --silent --show-error \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz" \
            --output /tmp/mcp-publisher.tar.gz
          echo "${MCP_PUBLISHER_SHA256}  /tmp/mcp-publisher.tar.gz" | sha256sum --check
          tar -xzf /tmp/mcp-publisher.tar.gz -C /tmp mcp-publisher

      - name: Authenticate with GitHub OIDC
        run: /tmp/mcp-publisher login github-oidc

      - name: Validate registry metadata
        run: /tmp/mcp-publisher validate

      - name: Publish registry metadata
        run: /tmp/mcp-publisher publish
